name: Retrain Forecast

# Triggered by scripts/email_ingest.py (or any HTTP client) via the GitHub
# repository_dispatch API with event_type = "retrain-forecast".
#
# Runs the Prophet training pipeline in forecasting.py against the
# partitioned Parquet store and commits refreshed forecast pickles back
# to the repo (data/forecasts_*.pkl) via the same GitHub Contents API
# path the Streamlit dashboard uses.

on:
  repository_dispatch:
    types: [retrain-forecast]

permissions:
  contents: write

concurrency:
  # Only one retrain at a time — Prophet training is CPU-bound and the
  # commits all target the same data/forecasts_*.pkl blobs.
  group: retrain-forecast
  cancel-in-progress: true

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Streamlit secrets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          mkdir -p .streamlit
          cat > .streamlit/secrets.toml <<EOF
          [github]
          token = "${GH_TOKEN}"
          repo  = "${GH_REPO}"
          EOF

      - name: Run forecasting.py (retrain all maps)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          # forecasting.py has no __main__ block and is imported by the
          # Streamlit app.  We invoke its streaming retrain entry point
          # directly with the default resource assignments from config.py.
          import forecasting
          from config import DEFAULT_RESOURCES

          forecasting.retrain_all_forecasts_streaming(DEFAULT_RESOURCES)
          print("Retrain complete.")
          PY
