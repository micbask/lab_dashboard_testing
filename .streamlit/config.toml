[client]
# Hide the "Deploy" button + the rerun / clear-cache developer options
# from the top-right toolbar. Documented in
# https://docs.streamlit.io/develop/api-reference/configuration/config.toml
# under [client] toolbarMode. Valid values: "auto" | "developer" |
# "viewer" | "minimal". "viewer" hides the developer options for
# everyone (including the app owner when logged in to Streamlit Cloud)
# — this is the approach Streamlit PR #14337 (released in 1.55)
# documented as the supported way to hide the Deploy button without
# CSS hacks. The CSS in ui_components.py also display:none's the
# entire [data-testid="stHeader"] as a belt-and-suspenders.
toolbarMode = "viewer"

[theme]
base = "light"
primaryColor = "#6F1828"
backgroundColor = "#f4f4f4"
# secondaryBackgroundColor MUST stay light. Streamlit uses it as the
# background of every "secondary surface" — the sidebar, AND the
# st.date_input calendar popup, AND selectbox dropdowns. The sidebar
# is overridden to #1C1917 explicitly via CSS in ui_components.py, so
# leaving this at the Streamlit-default light value lets the calendar
# popup keep its readable light theme (textColor = #0f172a renders
# dark-on-light correctly there). A previous dark value here painted
# the calendar header bar dark with dark text = invisible "May 2026".
secondaryBackgroundColor = "#f0f2f6"
textColor = "#0f172a"
font = "sans serif"
