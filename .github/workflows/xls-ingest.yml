name: XLS Ingest

# Triggered by Power Automate (or any HTTP client) via the GitHub
# repository_dispatch API with event_type = "xls-ingest".
#
# client_payload schema:
#   {
#     "filename": "All Labs 04.01.2026-04.30.2026.xls",
#     "file_b64": "<base64-encoded file bytes>"
#   }
#
# The workflow decodes the payload, runs parsing.parse_single_file(),
# and calls storage.ingest_new_data() to write directly into the
# partitioned Parquet store. The raw XLS file is NEVER committed.

on:
  repository_dispatch:
    types: [xls-ingest]

permissions:
  contents: write

concurrency:
  # Serialise ingests so two dispatches can't race on the partition index.
  group: xls-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Stage payload
        env:
          FILE_B64: ${{ github.event.client_payload.file_b64 }}
          FILENAME: ${{ github.event.client_payload.filename }}
        run: |
          mkdir -p /tmp/ingest
          python - <<'PY'
          import json, os
          payload = {
              "filename": os.environ.get("FILENAME") or "upload.xls",
              "file_b64": os.environ.get("FILE_B64") or "",
          }
          if not payload["file_b64"]:
              raise SystemExit("::error::client_payload.file_b64 is empty")
          with open("/tmp/ingest/payload.json", "w", encoding="utf-8") as f:
              json.dump(payload, f)
          print(f"Staged payload for {payload['filename']}")
          PY

      - name: Parse and ingest into partitioned store
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PAYLOAD_PATH: /tmp/ingest/payload.json
        run: python .github/scripts/ingest_xls.py
